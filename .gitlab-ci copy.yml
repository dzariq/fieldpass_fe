stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: dzariq/fieldpass-board
  DOCKER_TAG: latest
  DROPLET_IP: 178.128.49.171
  CONTAINER_NAME: fieldpass
  DROPLET_USER: root
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: fieldpass_app
  DB_USERNAME: root
  DB_PASSWORD: "#1Sampai9"
  GITLAB_USER: "dzariq"
  GITLAB_TOKEN: $CI_JOB_TOKEN
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # SonarCloud cache location
  GIT_DEPTH: "0"  # Fetch all branches for SonarCloud analysis

# ----------------------------------
# SonarCloud Scan
# ----------------------------------
sonarcloud-check:
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  stage: build
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "dev"'

# ----------------------------------
# Build Docker Image and Push
# ----------------------------------
build_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE:$DOCKER_TAG .
    - docker push $DOCKER_IMAGE:$DOCKER_TAG
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ----------------------------------
# Deploy to Droplet Server
# ----------------------------------
deploy_to_droplet:
  stage: deploy
  image: docker:latest
  before_script:
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_PUBLIC_KEY" | tr -d '\r' > ~/.ssh/id_rsa.pub
    - chmod 644 ~/.ssh/id_rsa.pub
    - echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
    - ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - docker-compose -H "ssh://$DROPLET_USER@$DROPLET_IP" pull
    - docker-compose -H "ssh://$DROPLET_USER@$DROPLET_IP" down
    - docker-compose -H "ssh://$DROPLET_USER@$DROPLET_IP" up -d --build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
